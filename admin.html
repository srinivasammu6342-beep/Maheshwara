HTML<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login • Maheshwara News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .dark-tech-bg {
            background: linear-gradient(180deg, #0a1128 0%, #02040f 100%);
        }
        
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
        }
        
        .neon-cyan-glow {
            text-shadow: 0 0 25px #00f7ff, 0 0 50px #00f7ff;
        }
    </style>
</head>
<body class="dark-tech-bg text-white min-h-screen flex items-center justify-center">
    
    <div class="w-full max-w-md px-6">
        <!-- Logo Header -->
        <div class="flex justify-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-red-500 to-rose-600 rounded-2xl flex items-center justify-center shadow-[0_0_40px_-10px] shadow-red-500">
                    <i class="fa-solid fa-shield-halved text-4xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter neon-cyan-glow">ADMIN</h1>
                    <p class="text-red-400 text-sm tracking-[3px]">MAHESHWARA NEWS</p>
                </div>
            </div>
        </div>

        <div class="glass border border-white/20 rounded-3xl p-10 shadow-2xl">
            <h2 class="text-2xl font-semibold text-center mb-8">Secure Admin Access</h2>
            
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <!-- User ID -->
                <div>
                    <label class="block text-xs uppercase tracking-widest text-white/70 mb-2">User ID</label>
                    <div class="relative">
                        <input id="userid" type="text" 
                               class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 outline-none text-white placeholder:text-white/40"
                               placeholder="admin" required>
                        <i class="fa-solid fa-user absolute right-6 top-1/2 -translate-y-1/2 text-white/40"></i>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-xs uppercase tracking-widest text-white/70 mb-2">Password</label>
                    <div class="relative">
                        <input id="password" type="password" 
                               class="w-full bg-white/10 border border-white/30 focus:border-cyan-400 rounded-2xl px-6 py-4 outline-none text-white placeholder:text-white/40"
                               placeholder="••••••••" required>
                        <i class="fa-solid fa-lock absolute right-6 top-1/2 -translate-y-1/2 text-white/40"></i>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 accent-cyan-400">
                        <span class="text-white/70">Remember me</span>
                    </label>
                    <a href="#" class="text-cyan-400 hover:underline text-sm">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                        class="w-full py-5 bg-gradient-to-r from-red-600 via-rose-600 to-red-600 hover:brightness-110 font-bold text-xl rounded-3xl flex items-center justify-center gap-3 shadow-lg shadow-red-500/50">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    LOGIN TO DASHBOARD
                </button>
            </form>

            <!-- Demo Credentials Hint -->
            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <p class="text-xs text-white/50 mb-2">Demo Credentials (for testing)</p>
                <div class="bg-black/40 rounded-2xl p-4 text-left text-sm font-mono">
                    <p><span class="text-cyan-400">User ID:</span> <span class="text-white">admin</span></p>
                    <p><span class="text-cyan-400">Password:</span> <span class="text-white">maheshwara2026</span></p>
                </div>
            </div>
        </div>

        <div class="text-center mt-8 text-xs text-white/40">
            © 2026 Maheshwara News • Kasrlagadda Bus Stand, MUTHARAM
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            
            const userid = document.getElementById('userid').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Demo credentials
            if (userid === "admin" && password === "maheshwara2026") {
                // Success animation + redirect
                const btn = document.querySelector('button[type="submit"]');
                btn.innerHTML = `
                    <i class="fa-solid fa-check"></i> 
                    ACCESS GRANTED
                `;
                btn.classList.add('!bg-emerald-500');
                
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 1200);
            } 
            else {
                // Error feedback
                const form = document.getElementById('loginForm');
                form.classList.add('animate-shake');
                
                setTimeout(() => {
                    form.classList.remove('animate-shake');
                    alert("❌ Invalid credentials!\n\nUse:\nUser ID: admin\nPassword: maheshwara2026");
                }, 500);
            }
        }

        // Simple shake animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-8px); }
                40%, 80% { transform: translateX(8px); }
            }
            .animate-shake {
                animation: shake 0.4s ease-in-out;
            }
        `;
        document.head.appendChild(style);

        // Auto-focus on load
        window.onload = () => {
            document.getElementById('userid').focus();
        };
    </script>
</body>
</html>
