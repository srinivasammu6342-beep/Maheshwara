<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin • Maheshwara News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .dark-tech-bg { background: linear-gradient(180deg, #0a1128 0%, #02040f 100%); }
    </style>
</head>
<body class="dark-tech-bg text-white min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-12">
        <h1 class="text-5xl font-bold mb-2 neon-cyan-glow text-center">ADMIN CONTROL PANEL</h1>
        <p class="text-center text-white/60 mb-12">Maheshwara News Dashboard</p>

        <!-- Post News Form -->
        <div class="glass bg-slate-900/80 border border-white/10 rounded-3xl p-10">
            <h2 class="text-2xl font-semibold mb-8">Post New Article</h2>
            <form id="postForm" onsubmit="postNews(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm mb-2">Headline (Telugu)</label>
                    <input id="headline" type="text" required class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-2">Headline (English)</label>
                    <input id="headlineEn" type="text" required class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-2">Short Description</label>
                    <textarea id="body" rows="3" required class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-4"></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-2">Image URL</label>
                    <input id="image" type="url" placeholder="https://picsum.photos/..." class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4">
                </div>
                <div>
                    <label class="block text-sm mb-2">Category</label>
                    <select id="category" class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4">
                        <option value="Local">Local</option>
                        <option value="Politics">Politics</option>
                        <option value="Agri">Agri</option>
                        <option value="Education">Education</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" 
                            class="w-full py-5 bg-gradient-to-r from-red-600 to-rose-600 font-bold text-lg rounded-3xl">PUBLISH NEWS</button>
                </div>
            </form>
        </div>

        <!-- Posted News List -->
        <div class="mt-16">
            <h2 class="text-2xl font-semibold mb-6">Posted Articles</h2>
            <div id="postedList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        function postNews(e) {
            e.preventDefault();
            
            const news = {
                id: Date.now(),
                headline: document.getElementById('headline').value,
                headlineEn: document.getElementById('headlineEn').value,
                body: document.getElementById('body').value,
                image: document.getElementById('image').value || "https://picsum.photos/id/237/800/450",
                category: document.getElementById('category').value,
                date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
            };
            
            let allNews = JSON.parse(localStorage.getItem('maheshwaraNews')) || [];
            allNews.unshift(news);
            localStorage.setItem('maheshwaraNews', JSON.stringify(allNews));
            
            alert('✅ News Published Successfully!');
            document.getElementById('postForm').reset();
            renderPostedList();
        }

        function renderPostedList() {
            const container = document.getElementById('postedList');
            const newsList = JSON.parse(localStorage.getItem('maheshwaraNews')) || [];
            
            container.innerHTML = newsList.map(news => `
                <div class="flex justify-between items-center bg-slate-900/70 border border-white/10 p-6 rounded-3xl">
                    <div>
                        <p class="font-medium">${news.headline}</p>
                        <p class="text-xs text-white/50">${news.category} • ${news.date}</p>
                    </div>
                    <button onclick="deleteNews(${news.id})" 
                            class="px-6 py-3 bg-red-600/80 hover:bg-red-700 text-sm rounded-2xl">DELETE</button>
                </div>
            `).join('');
        }

        function deleteNews(id) {
            if (!confirm('Delete this news?')) return;
            let newsList = JSON.parse(localStorage.getItem('maheshwaraNews')) || [];
            newsList = newsList.filter(n => n.id !== id);
            localStorage.setItem('maheshwaraNews', JSON.stringify(newsList));
            renderPostedList();
        }

        window.onload = renderPostedList;
    </script>
</body>
</html>
