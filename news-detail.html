<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Detail - Maheshwara Nexlify News</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f5ff;
            --royal-red: #ff0033;
            --emerald-green: #00ff9d;
            --midnight-blue: #0a0f2c;
            --glass-bg: rgba(15, 23, 42, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #1a1f3d 100%);
            color: #e0f7ff;
            min-height: 100vh;
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: rgba(10, 15, 44, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.4);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.15);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .main-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.1rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00f5ff, #a0f7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #00f5ff;
            letter-spacing: 1.5px;
        }

        .nav-link {
            color: #a0d8ff;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
        }

        /* Main Content */
        .news-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 40px;
            margin-top: 40px;
        }

        .main-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.4);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .meta-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
            font-size: 0.95rem;
            color: #94a3b8;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-id {
            background: rgba(0, 245, 255, 0.15);
            color: var(--neon-cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 245, 255, 0.3);
        }

        h1.headline {
            font-family: 'Noto Sans Telugu', 'Space Grotesk', sans-serif;
            font-size: 2.6rem;
            line-height: 1.25;
            margin-bottom: 18px;
            color: #ffffff;
            text-shadow: 0 0 25px rgba(0, 245, 255, 0.4);
        }

        .subheadline {
            font-size: 1.25rem;
            font-style: italic;
            color: #b0e0ff;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .media-gallery {
            margin: 35px 0;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(0, 245, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.2);
        }

        .media-gallery img, .media-gallery video {
            width: 100%;
            display: block;
            max-height: 520px;
            object-fit: cover;
        }

        .news-body {
            font-size: 1.15rem;
            line-height: 1.85;
            color: #d0e8ff;
            margin-bottom: 40px;
        }

        .bullets {
            background: rgba(10, 15, 44, 0.7);
            border-left: 5px solid var(--emerald-green);
            padding: 25px 30px;
            border-radius: 16px;
            margin: 35px 0;
        }

        .bullets ul {
            list-style: none;
        }

        .bullets li {
            padding: 8px 0;
            position: relative;
            padding-left: 28px;
        }

        .bullets li:before {
            content: '◆';
            color: var(--emerald-green);
            position: absolute;
            left: 0;
            font-size: 1.1rem;
        }

        .closing-line {
            font-style: italic;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            padding: 25px;
            border: 1px dashed rgba(0, 245, 255, 0.5);
            border-radius: 16px;
            margin: 40px 0;
            text-align: center;
            background: rgba(0, 245, 255, 0.05);
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 20px;
            padding: 28px;
        }

        .flash-badge {
            background: linear-gradient(90deg, #ff3366, #ff6699);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.7);
        }

        .share-box h3 {
            color: var(--neon-cyan);
            margin-bottom: 18px;
            font-size: 1.3rem;
        }

        .social-share {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .social-share a {
            width: 52px;
            height: 52px;
            background: rgba(10, 15, 44, 0.8);
            border: 2px solid rgba(0, 245, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #a0d8ff;
            transition: all 0.3s ease;
        }

        .social-share a:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: scale(1.15) rotate(8deg);
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 10px 20px;
            border: 1px solid rgba(0, 245, 255, 0.4);
            border-radius: 50px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .news-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 30px 20px;
            }
            h1.headline {
                font-size: 2.1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 class="main-heading">MAHESHWARA NEXLIFY NUCLEUS DIGITAL SERVICES</h1>
            <nav>
                <a href="index.html" class="nav-link">← Home</a>
                <a href="upload-news.html" class="nav-link">Upload News</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Newsroom
        </a>

        <div class="news-container">
            <!-- Main Content -->
            <div class="main-content" id="newsContent">
                <!-- Content will be dynamically loaded here via JavaScript -->
                <div style="text-align:center; padding:80px 20px; color:#64748b;" id="loading">
                    <i class="fas fa-spinner fa-spin" style="font-size:3rem; margin-bottom:20px; color:var(--neon-cyan);"></i>
                    <p>Loading futuristic news transmission...</p>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Flash News Indicator -->
                <div class="sidebar-card" id="flashCard" style="display:none;">
                    <div class="flash-badge">
                        <i class="fas fa-bolt"></i> FLASH NEWS
                    </div>
                    <p style="margin-top:15px; font-size:0.95rem; line-height:1.6;">
                        This story is currently featured in the live ticker.
                    </p>
                </div>

                <!-- News Info -->
                <div class="sidebar-card">
                    <h3 style="color:var(--neon-cyan); margin-bottom:15px;">Story Details</h3>
                    <div id="sidebarMeta" style="font-size:0.95rem; line-height:1.8;"></div>
                </div>

                <!-- Share -->
                <div class="sidebar-card share-box">
                    <h3>Share this story</h3>
                    <div class="social-share">
                        <a href="#" onclick="shareTo('whatsapp')" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                        <a href="#" onclick="shareTo('facebook')" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" onclick="shareTo('twitter')" title="X / Twitter"><i class="fab fa-x-twitter"></i></a>
                        <a href="#" onclick="shareTo('telegram')" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="sidebar-card">
                    <button onclick="window.location.href='upload-news.html'" 
                            style="width:100%; padding:16px; background:linear-gradient(90deg, #00ff9d, #00cc7a); color:#0a0f2c; border:none; border-radius:50px; font-weight:700; cursor:pointer; margin-bottom:12px;">
                        UPLOAD NEW STORY
                    </button>
                    <button onclick="window.history.back()" 
                            style="width:100%; padding:16px; background:transparent; color:var(--neon-cyan); border:2px solid var(--neon-cyan); border-radius:50px; font-weight:600; cursor:pointer;">
                        ← RETURN TO NEWSROOM
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get news ID from URL query parameter
        function getNewsIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // Load news from localStorage
        function loadNewsDetail() {
            const newsId = getNewsIdFromUrl();
            if (!newsId) {
                document.getElementById('newsContent').innerHTML = `
                    <div style="text-align:center; padding:100px 20px; color:#ff3366;">
                        <h2>⚠️ No News ID Found</h2>
                        <p>Please access this page with ?id=NEWSID parameter.</p>
                    </div>`;
                return;
            }

            const allNews = JSON.parse(localStorage.getItem('mns_news_data')) || [];
            const news = allNews.find(item => item.id === newsId);

            if (!news) {
                document.getElementById('newsContent').innerHTML = `
                    <div style="text-align:center; padding:100px 20px; color:#ff6699;">
                        <h2>Story Not Found</h2>
                        <p>The requested news article does not exist or has been removed.</p>
                        <a href="index.html" style="color:var(--neon-cyan);">Return to Newsroom →</a>
                    </div>`;
                return;
            }

            // Hide loading
            document.getElementById('loading').style.display = 'none';

            // Render main content
            let html = `
                <div class="meta-bar">
                    <div class="meta-item"><i class="fas fa-calendar"></i> ${news.date}</div>
                    <div class="meta-item"><i class="fas fa-map-marker-alt"></i> ${news.location}</div>
                    <div class="meta-item news-id">${news.id}</div>
                    <div class="meta-item"><i class="fas fa-tag"></i> ${news.category}</div>
                </div>

                <h1 class="headline">${news.headline}</h1>
            `;

            if (news.subheadline) {
                html += `<p class="subheadline">${news.subheadline}</p>`;
            }

            // Media placeholder (in real app you would store and display actual media)
            if (news.mediaCount && news.mediaCount > 0) {
                html += `
                    <div class="media-gallery">
                        <img src="https://picsum.photos/id/1015/1200/600" alt="News Image" style="width:100%;">
                    </div>
                `;
            }

            html += `<div class="news-body">${news.body.replace(/\n/g, '<br><br>')}</div>`;

            if (news.bullets) {
                const bulletLines = news.bullets.split('\n').filter(line => line.trim() !== '');
                let bulletsHtml = '<div class="bullets"><ul>';
                bulletLines.forEach(line => {
                    bulletsHtml += `<li>${line.replace('•', '').trim()}</li>`;
                });
                bulletsHtml += '</ul></div>';
                html += bulletsHtml;
            }

            if (news.closing) {
                html += `<div class="closing-line">"${news.closing}"</div>`;
            }

            document.getElementById('newsContent').innerHTML = html;

            // Sidebar meta
            let sidebarHtml = `
                <p><strong>Date:</strong> ${news.date}</p>
                <p><strong>Location:</strong> ${news.location}</p>
                <p><strong>Category:</strong> ${news.category}</p>
                <p><strong>News Code:</strong> ${news.newsCode || 'N/A'}</p>
                <p><strong>Published:</strong> ${new Date(news.timestamp).toLocaleString('en-IN')}</p>
            `;
            document.getElementById('sidebarMeta').innerHTML = sidebarHtml;

            // Show flash card if applicable
            if (news.isFlash) {
                document.getElementById('flashCard').style.display = 'block';
            }
        }

        // Simple share functions
        function shareTo(platform) {
            const newsId = getNewsIdFromUrl();
            const currentUrl = window.location.href;
            let shareText = "Check out this latest news from Maheshwara Nexlify News!";

            if (platform === 'whatsapp') {
                window.open(`https://wa.me/?text=${encodeURIComponent(shareText + " " + currentUrl)}`, '_blank');
            } else if (platform === 'facebook') {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`, '_blank');
            } else if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(currentUrl)}`, '_blank');
            } else if (platform === 'telegram') {
                window.open(`https://t.me/share/url?url=${encodeURIComponent(currentUrl)}&text=${encodeURIComponent(shareText)}`, '_blank');
            }
        }

        // Initialize
        window.onload = function() {
            loadNewsDetail();
        };
    </script>
</body>
</html>
